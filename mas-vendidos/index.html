<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Más vendidos MercadoLibre — a demanda</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<div class="max-w-6xl mx-auto p-6">
  <header class="mb-6">
    <a href="../" class="text-sm text-blue-600 hover:underline">← Volver al portal</a>
    <h1 class="text-3xl font-black text-gray-800 mt-2">🔥 Más vendidos en MercadoLibre</h1>
    <p class="text-gray-500 text-sm">Elegí una categoría y traé su ranking de productos más vendidos en vivo.</p>
  </header>

  <!-- Config del backend (URL del tunel) -->
  <div class="bg-white p-4 rounded-xl shadow mb-6">
    <label class="block text-xs font-semibold text-gray-600 mb-1">URL del backend (la que te da tunnel.bat, ej. https://algo.trycloudflare.com)</label>
    <div class="flex flex-wrap gap-2">
      <input id="api" type="text" placeholder="http://127.0.0.1:8000"
             class="flex-1 min-w-[260px] border border-gray-300 rounded-lg px-3 py-2 text-sm">
      <button id="save" class="bg-gray-700 text-white px-4 py-2 rounded-lg text-sm">Guardar</button>
    </div>
    <p id="apistate" class="text-xs text-gray-400 mt-1"></p>
  </div>

  <!-- Selector de categoria -->
  <div class="flex flex-col gap-2 mb-6">
    <div class="flex flex-wrap gap-2 items-center">
      <select id="pais" class="border border-gray-300 rounded-lg px-3 py-2 font-semibold">
        <option value="AR">🇦🇷 Argentina</option>
        <option value="MX">🇲🇽 México</option>
        <option value="UY">🇺🇾 Uruguay</option>
      </select>
      <input id="filtro" type="text" placeholder="🔎 Filtrar categoría por nombre o ID (ej. Audio, MLA1000)…"
             class="flex-1 min-w-[240px] border border-gray-300 rounded-lg px-3 py-2">
      <select id="nivel" class="border border-gray-300 rounded-lg px-3 py-2">
        <option value="todas">Todos los niveles</option>
        <option value="l1">Solo L1 (raíz)</option>
        <option value="l2">Solo L2</option>
        <option value="l3">Solo L3</option>
      </select>
    </div>
    <div class="flex flex-wrap gap-2 items-center">
      <select id="cat" size="8" class="flex-1 min-w-[260px] border border-gray-300 rounded-lg px-3 py-2"></select>
    </div>
    <div class="flex flex-wrap gap-2 items-center">
      <button id="go" class="bg-blue-700 hover:bg-blue-800 text-white px-5 py-2 rounded-lg font-semibold">Buscar más vendidos</button>
      <a id="verlink" href="#" target="_blank" class="hidden text-sm text-blue-600 hover:underline">🔗 Ver esta categoría en MercadoLibre</a>
      <span id="count" class="text-xs text-gray-400"></span>
      <span id="status" class="text-sm text-gray-500"></span>
    </div>
  </div>

  <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4"></div>
</div>

<script>
const $ = id => document.getElementById(id);
// URL del backend: persistida en el navegador
let API = localStorage.getItem("meli_api") || "http://127.0.0.1:8000";
$("api").value = API;

$("save").onclick = () => {
  API = $("api").value.trim().replace(/\/+$/, "");
  localStorage.setItem("meli_api", API);
  $("apistate").textContent = "Guardado: " + API;
  cargarCategorias();
};

let CATS = [];                 // catalogo completo en memoria
const NIVEL_ORDEN = { L1: 0, L2: 1, L3: 2 };
const esc = s => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

// Link a la pagina de mas vendidos segun el prefijo del ID
const DOMINIOS = { MLM: "com.mx", MLU: "com.uy", MLA: "com.ar" };
const urlMasVendidos = id =>
  `https://www.mercadolibre.${DOMINIOS[id.slice(0,3)] || "com.ar"}/mas-vendidos/${id}`;

function actualizarLink() {
  const id = $("cat").value;
  const a = $("verlink");
  if (id) { a.href = urlMasVendidos(id); a.classList.remove("hidden"); }
  else { a.classList.add("hidden"); }
}

async function cargarCategorias() {
  $("cat").innerHTML = "";
  try {
    const pais = $("pais").value;
    const r = await fetch(`${API}/categorias?pais=${pais}&nivel=todas`);
    CATS = await r.json();
    CATS.sort((a, b) => (NIVEL_ORDEN[a.nivel] - NIVEL_ORDEN[b.nivel]) ||
                        (a.ruta || a.nombre).localeCompare(b.ruta || b.nombre));
    $("apistate").textContent = "Conectado a " + API + " · " + CATS.length + " categorías";
    renderOpciones();
  } catch (e) {
    $("apistate").textContent = "⚠ No se pudo conectar a " + API + ". ¿Está corriendo start.bat + tunnel.bat?";
  }
}

function renderOpciones() {
  const q = $("filtro").value.trim().toLowerCase();
  const niv = $("nivel").value;
  let lista = CATS;
  if (niv !== "todas") lista = lista.filter(c => c.nivel.toLowerCase() === niv);
  if (q) lista = lista.filter(c =>
    (c.ruta || c.nombre).toLowerCase().includes(q) || c.id.toLowerCase().includes(q));

  const MAX = 1000; // limita el render para que el navegador no sufra
  const recortada = lista.slice(0, MAX);
  $("cat").innerHTML = recortada.map(c =>
    `<option value="${c.id}">[${c.nivel}] ${esc(c.ruta || c.nombre)} · ${c.id}</option>`).join("");
  $("count").textContent = lista.length + " categorías" +
    (lista.length > MAX ? ` (mostrando ${MAX}, refiná el filtro)` : "");
  actualizarLink();
}

async function buscar() {
  const id = $("cat").value;
  if (!id) return;
  $("go").disabled = true;
  $("grid").innerHTML = "";
  $("status").textContent = "Buscando… (puede tardar unos segundos)";
  try {
    const r = await fetch(`${API}/mas-vendidos/${id}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      $("status").textContent = "Error " + r.status + ": " + (err.detail || "no disponible");
      return;
    }
    const data = await r.json();
    $("status").textContent = `${data.cantidad} productos · ${data.categoria}` + (data.cacheado ? " (cache)" : "");
    // link de validacion: abrir la pagina real de mas vendidos
    if (data.url) { $("verlink").href = data.url; $("verlink").classList.remove("hidden"); }
    $("grid").innerHTML = data.productos.map(p => `
      <div class="bg-white rounded-xl shadow overflow-hidden flex flex-col">
        <img src="${p.imagen || ''}" class="w-full h-40 object-contain bg-gray-50" onerror="this.style.visibility='hidden'">
        <div class="p-3 flex flex-col gap-1">
          <span class="text-xs font-bold text-blue-700">#${p.ranking} más vendido</span>
          <a href="${p.link}" target="_blank" class="text-sm text-gray-800 hover:text-blue-700 leading-tight line-clamp-3">${p.titulo}</a>
          <span class="text-lg font-semibold text-gray-900">$${p.precio}</span>
          <span class="text-xs text-green-600">${p.vendedor || ''}</span>
        </div>
      </div>`).join("");
  } catch (e) {
    $("status").textContent = "⚠ Error de conexión con el backend.";
  } finally {
    $("go").disabled = false;
  }
}

$("go").onclick = buscar;
$("filtro").addEventListener("input", renderOpciones);
$("nivel").addEventListener("change", renderOpciones);
$("pais").addEventListener("change", cargarCategorias);
$("cat").addEventListener("change", actualizarLink);
cargarCategorias();
</script>
</body>
</html>
